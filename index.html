<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SEMRA C.C.</title>

<!-- ✅ FIXED LIBRARIES (THIS WAS YOUR MAIN ISSUE) -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.js"></script>

<style>
body { margin:0; font-family:Arial; background:#eef2f6; }

.header {
 background:#2c3e50;
 color:white;
 padding:10px;
 display:flex;
 justify-content:center;
 align-items:center;
 gap:10px;
}

.container { max-width:650px; margin:auto; padding:15px; }

.panel {
 background:white;
 padding:20px;
 border-radius:10px;
}

textarea {
 width:100%;
 height:80px;
 padding:10px;
 font-size:16px;
}

button {
 width:100%;
 padding:14px;
 margin-top:8px;
 background:#0078d4;
 color:white;
 border:none;
 border-radius:6px;
}

.result {
 margin-top:15px;
 padding:15px;
 background:#f9f9f9;
}

.warning { color:#b30000; font-weight:bold; }

#map { height:300px; margin-top:15px; }
</style>
</head>

<body>

<div class="header">
<div>SEMRA C.C.</div>
</div>

<div class="container">
<div class="panel">

<textarea id="input" placeholder="Enter coordinates"></textarea>

<button onclick="convert()">Convert & Locate</button>

<div id="result"></div>
<div id="map"></div>

</div>
</div>

<script>

// projections
proj4.defs("EPSG:4326","+proj=longlat +datum=WGS84 +no_defs");
proj4.defs("EPSG:29903","+proj=tmerc +lat_0=53.5 +lon_0=-8 +x_0=200000 +y_0=250000 +ellps=airy");

// map
let map = L.map('map').setView([53.5,-8],7);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
let marker;

// helpers
function toDMS(d,lat){
 let deg=Math.floor(Math.abs(d));
 let min=Math.floor((Math.abs(d)-deg)*60);
 let sec=((Math.abs(d)-deg)*3600 - min*60).toFixed(2);
 let dir=lat?(d>=0?"N":"S"):(d>=0?"E":"W");
 return `${deg}° ${min}' ${sec}" ${dir}`;
}

// ✅ SINGLE CLEAN PARSER (ALL FORMATS)
function parse(input){

 input=input.toUpperCase();

 // normalise
 input=input.replace(/_/g," ")
 .replace(/,/g," ")
 .replace(/[°'"]/g," ")
 .replace(/\s+/g," ")
 .trim();

 let t=input.split(" ");

 // ✅ DMS full (52 22 48 N 8 14 35 W)
 if(t.length>=7 && t.includes("N") || t.includes("S")){
  try{
    let lat=(+t[0])+(+t[1]/60)+(+t[2]/3600);
    if(t[3]==="S") lat*=-1;

    let lon=(+t[4])+(+t[5]/60)+(+t[6]/3600);
    if(t[7]==="W") lon*=-1;

    return {lat,lon,type:"DMS"};
  }catch{}
 }

 // ✅ COMPRESSED DMS (5215 7.26 N)
 if(t.length>=6 && t[0].length>=3){

  function dm(v){
    let deg=parseInt(v.slice(0,2));
    let min=parseInt(v.slice(2)||0);
    return [deg,min];
  }

  let [d1,m1]=dm(t[0]);
  let [d2,m2]=dm(t[3]);

  let lat=d1+(m1/60)+(t[1]/3600);
  let lon=d2+(m2/60)+(t[4]/3600);

  if(t[2]==="S") lat*=-1;
  if(t[5]==="W") lon*=-1;

  return {lat,lon,type:"DMS"};
 }

 // ✅ DMM
 let dmm=input.match(/([NS])\s*(\d+)\s+([\d.]+).*?([EW])\s*(\d+)\s+([\d.]+)/);
 if(dmm){
  let lat=(+dmm[2])+(+dmm[3]/60);
  let lon=(+dmm[5])+(+dmm[6]/60);
  if(dmm[1]==="S") lat*=-1;
  if(dmm[4]==="W") lon*=-1;
  return {lat,lon,type:"DMM"};
 }

 // ✅ Decimal
 let dec=input.match(/(-?\d+\.\d+)[\s]+(-?\d+\.\d+)/);
 if(dec){
  return {lat:+dec[1],lon:+dec[2],type:"Decimal"};
 }

 // ✅ Irish grid
 let g=input.match(/^([A-Z])\s*(\d+)\s*(\d+)/);
 if(g){
  const letters="VWXYZQRSTULMNOPFGHJKABCDE";
  let idx=letters.indexOf(g[1]);
  let e=(idx%5)*100000 + Number(g[2])*Math.pow(10,5-g[2].length);
  let n=Math.floor(idx/5)*100000 + Number(g[3])*Math.pow(10,5-g[3].length);
  let c=proj4("EPSG:29903","EPSG:4326",[e,n]);
  return {lat:c[1],lon:c[0],type:"Irish Grid"};
 }

 return null;
}

// ✅ WARNING
function warning(lat,lon){
 if(lat<51||lat>56||lon>-5||lon<-11){
   if(Math.abs(lon)>20){
     return "⚠️ Possible wrong longitude (e.g. 83 instead of 8)";
   }
   return "⚠️ Location appears outside Ireland";
 }
 return "";
}

// ✅ MAIN
function convert(){
 let res=parse(input.value);

 if(!res){
   result.innerHTML="❌ Invalid input";
   return;
 }

 let lat=res.lat, lon=res.lon;

 // grid
 let g=proj4("EPSG:4326","EPSG:29903",[lon,lat]);
 let grid=`${Math.round(g[0])}, ${Math.round(g[1])}`;

 let warn=warning(lat,lon);

 result.innerHTML=`
 <div class="result">
 <b>Detected:</b> ${res.type}
 <br><br>
 <b>Decimal:</b><br>${lat.toFixed(6)}, ${lon.toFixed(6)}
 <br><br>
 <b>DMS:</b><br>${toDMS(lat,true)}<br>${toDMS(lon,false)}
 <br><br>
 <b>Irish Grid:</b><br>${grid}
 ${warn?`<div class="warning">${warn}</div>`:""}
 </div>
 `;

 map.setView([lat,lon],13);
 if(marker) marker.setLatLng([lat,lon]);
 else marker=L.marker([lat,lon]).addTo(map);
}

</script>
</body>
</html>
