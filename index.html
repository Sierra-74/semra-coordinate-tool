<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>SEMRA Coordinate Converter</title>

<!-- ✅ PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2c3e50">

<!-- ✅ Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- ✅ Proj4 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.js"></script>

<!-- ✅ Screenshot -->
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
body { margin:0; font-family:Arial; background:#eef2f6; }

.header {
    background:#2c3e50;
    color:white;
    padding:10px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    font-size:18px;
}

.logo { height:40px; }

.container { max-width:650px; margin:auto; padding:15px; }

.panel {
    background:white;
    padding:20px;
    border-radius:10px;
    position:relative;
}

textarea {
    width:100%;
    height:70px;
    padding:10px;
    font-size:16px;
    border-radius:6px;
    border:1px solid #ccc;
}

button {
    width:100%;
    padding:14px;
    margin-top:8px;
    background:#0078d4;
    color:white;
    border:none;
    border-radius:6px;
    font-size:16px;
}

.reset { background:#666; }

.result {
    margin-top:15px;
    padding:15px;
    background:#f9f9f9;
    border-radius:6px;
    line-height:1.6;
}

#map {
    height:300px;
    margin-top:15px;
    border-radius:6px;
}

.signature {
    position:absolute;
    bottom:6px;
    right:10px;
    font-size:11px;
    color:#888;
}
</style>
</head>

<body>

<div class="header">
    <img src="https://www.semra.ie/wp-content/uploads/2021/10/semra_logo_196x221_transparent.png" class="logo">
    <div>SEMRA Coordinate Converter</div>
</div>

<div class="container">
<div class="panel" id="captureArea">

<textarea id="input" placeholder="Enter or paste coordinates (Lat/Lon or Irish Grid)"></textarea>

<button onclick="convert()">Convert & Locate</button>
<button class="reset" onclick="resetTool()">Reset</button>

<div id="result"></div>
<div id="map"></div>

<div class="signature">S74</div>

</div>
</div>

<script>

// ✅ FORCE CACHE CLEAR (fix update issue)
window.addEventListener('load', () => {
    if ('caches' in window) {
        caches.keys().then(names => {
            names.forEach(name => caches.delete(name));
        });
    }
});

// ✅ PROJECTIONS
proj4.defs("EPSG:4326","+proj=longlat +datum=WGS84 +no_defs");
proj4.defs("EPSG:29903","+proj=tmerc +lat_0=53.5 +lon_0=-8 +k=1.000035 +x_0=200000 +y_0=250000 +ellps=airy");

// ✅ MAP
let map = L.map('map').setView([53.4,-8],7);

L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',{
    maxZoom:17
}).addTo(map);

let marker;

// ✅ FORMATTERS
function toDMS(deg, lat){
    let d=Math.floor(Math.abs(deg));
    let m=Math.floor((Math.abs(deg)-d)*60);
    let s=(((Math.abs(deg)-d)*60-m)*60).toFixed(2);
    let dir=lat?(deg>=0?"N":"S"):(deg>=0?"E":"W");
    return `${d}° ${m}' ${s}" ${dir}`;
}

function toDMM(deg, lat){
    let d=Math.floor(Math.abs(deg));
    let m=((Math.abs(deg)-d)*60).toFixed(4);
    let dir=lat?(deg>=0?"N":"S"):(deg>=0?"E":"W");
    return `${d}° ${m}' ${dir}`;
}

// ✅ GRID LETTER
function getGridLetter(E,N){
    const grid=[
        ['V','W','X','Y','Z'],
        ['Q','R','S','T','U'],
        ['L','M','N','O','P'],
        ['F','G','H','J','K'],
        ['A','B','C','D','E']
    ];
    return grid[Math.floor(N/100000)][Math.floor(E/100000)];
}

// ✅ ✅ FIXED PARSER (CRITICAL FIX)
function parse(input){

    input=input.toUpperCase().trim();

    let grid=input.match(/^([A-Z])\s*(\d+)\s*(\d+)/);

    if(grid){
        const letters="VWXYZQRSTULMNOPFGHJKABCDE";
        let idx=letters.indexOf(grid[1]);

        let e100=idx%5;
        let n100=Math.floor(idx/5);

        let eStr=grid[2];
        let nStr=grid[3];

        let scale=Math.pow(10,5-eStr.length);

        let E=e100*100000 + Number(eStr)*scale;
        let N=n100*100000 + Number(nStr)*scale;

        let coords=proj4("EPSG:29903","EPSG:4326",[E-50,N+19]);

        return {lat:coords[1],lon:coords[0]};
    }

    let dec=input.match(/(-?\d+\.\d+)[,\s]+(-?\d+\.\d+)/);
    if(dec) return {lat:+dec[1],lon:+dec[2]};

    return null;
}

// ✅ TIMESTAMP
function getTimestamp(){
    return new Date().toLocaleString('en-IE',{
        day:'2-digit',month:'short',year:'numeric',
        hour:'2-digit',minute:'2-digit'
    });
}

// ✅ WHATSAPP
function shareWhatsApp(lat,lon,grid){
    let msg=`Irish Grid: ${grid}
Decimal: ${lat.toFixed(6)}, ${lon.toFixed(6)}
Time: ${getTimestamp()}

https://maps.google.com/?q=${lat},${lon}`;

    window.open("https://wa.me/?text=" + encodeURIComponent(msg));
}

// ✅ SCREENSHOT
function saveScreenshot(){

    map.invalidateSize();

    setTimeout(()=>{
        html2canvas(document.getElementById("captureArea"),{
            useCORS:true,
            scale:2
        }).then(canvas=>{
            canvas.toBlob(blob=>{
                let file=new File([blob],"SEMRA_location.png",{type:"image/png"});

                if(navigator.share && navigator.canShare && navigator.canShare({files:[file]})){
                    navigator.share({files:[file],title:"SEMRA Location"});
                } else {
                    window.open(URL.createObjectURL(blob));
                }
            });
        });
    },400);
}

// ✅ MAIN
function convert(){

    let res=parse(input.value);

    if(!res){
        result.innerHTML="❌ Invalid input";
        return;
    }

    let lat=res.lat;
    let lon=res.lon;

    let g=proj4("EPSG:4326","EPSG:29903",[lon,lat]);
    let E=g[0]+50;
    let N=g[1]-19;

    let grid=`${getGridLetter(E,N)} ${Math.round(E%100000)} ${Math.round(N%100000)}`;

    result.innerHTML=`
    <div class="result">

    <b>Irish Grid</b><br>${grid}

    <br><b>Decimal</b><br>${lat.toFixed(6)}, ${lon.toFixed(6)}

    <br><b>DMS</b><br>${toDMS(lat,true)}<br>${toDMS(lon,false)}

    <br><b>DMM</b><br>${toDMM(lat,true)}<br>${toDMM(lon,false)}

    <br><br>

    <button onclick="shareWhatsApp(${lat},${lon},'${grid}')">
    Share via WhatsApp</button>

    <button onclick="saveScreenshot()">Share / Save Screenshot</button>

    <button onclick="window.open('https://maps.google.com/?q=${lat},${lon}')">
    Open Google Maps</button>

    </div>
    `;

    map.setView([lat,lon],13);

    if(marker) marker.setLatLng([lat,lon]);
    else marker=L.marker([lat,lon]).addTo(map);
}

// ✅ RESET
function resetTool(){
    input.value="";
    result.innerHTML="";
    if(marker){ map.removeLayer(marker); marker=null; }
    map.setView([53.4,-8],7);
}

</script>

</body>
</html>
``
