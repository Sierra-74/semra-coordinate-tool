<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>SEMRA S.C.O.U.T</title>

<link rel="manifest" href="manifest.json">

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{margin:0;font-family:Arial;background:#eef2f6}

.header{
  background:#1f2f3a;color:white;text-align:center;padding:14px
}

.container{max-width:700px;margin:auto;padding:15px}

.panel{
  background:white;padding:18px;border-radius:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);position:relative
}

textarea{
  width:100%;height:90px;padding:10px;font-size:16px;
  border-radius:6px
}

button{
  width:100%;padding:14px;margin-top:8px;
  border:none;border-radius:6px;font-size:16px
}

.primary{background:#0078d4;color:white}
.reset{background:#777;color:white}

.result{
  margin-top:15px;padding:15px;background:#f9f9f9;
  border-left:5px solid #0078d4
}

.grid{font-size:20px;font-weight:bold;color:#0078d4}
.coord{font-family:monospace}

#map{height:300px;margin-top:10px;border-radius:8px}
</style>

</head>
<body>

<div class="header">
  <img src="icon.png" style="height:40px">
  <div><b>S.C.O.U.T</b></div>
  <div>SEMRA Coordinate & Orientation Tool</div>
</div>

<div class="container">
<div class="panel" id="captureArea">

<textarea id="input"
placeholder="Enter coordinates or Eircode
Example:
53.3498 -6.2603
D02 X285"></textarea>

<button class="primary" onclick="convert()">Convert & Locate</button>
<button class="reset" onclick="resetTool()">Reset</button>

<div id="result"></div>
<div id="map"></div>

</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script>

// ---------------- MAP ----------------

let map=L.map('map').setView([53.5,-8],7);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map);

let marker;

// ---------------- HELPERS ----------------

function toDMS(d,lat){
 let deg=Math.floor(Math.abs(d));
 let min=Math.floor((Math.abs(d)-deg)*60);
 let sec=((Math.abs(d)-deg)*3600-min*60).toFixed(2);
 let dir=lat?(d>=0?"N":"S"):(d>=0?"E":"W");
 return `${deg}Â° ${min}' ${sec}" ${dir}`;
}

function getGridLetter(E,N){
 const g=[['V','W','X','Y','Z'],['Q','R','S','T','U'],
 ['L','M','N','O','P'],['F','G','H','J','K'],['A','B','C','D','E']];
 return g[Math.floor(N/100000)][Math.floor(E/100000)];
}

// ---------------- PARSER ----------------

function parse(val){

 val=val.toUpperCase().trim();

 // Eircode
 if(/^[A-Z0-9]{3}\s?[A-Z0-9]{4}$/.test(val)){
  return {type:"EIRCODE",value:val.replace(/\s+/g,"")};
 }

 let p=val.split(" ");

 if(p.length==2 && p[0].includes(".")){
  return {type:"DD",lat:+p[0],lon:+p[1]};
 }

 return null;
}

// ---------------- DISPLAY ----------------

function display(lat,lon,type){

 let g=proj4("EPSG:4326","EPSG:29903",[lon,lat]);
 let E=g[0],N=g[1];

 let e=Math.round(E%100000).toString().padStart(5,'0');
 let n=Math.round(N%100000).toString().padStart(5,'0');

 let grid=`${getGridLetter(E,N)} ${e} ${n}`;

 result.innerHTML=`
<div class="result">
<b>Detected:</b> ${type}<br><br>

<div class="grid">${grid}</div>

<br>

<div class="coord">${lat.toFixed(6)}, ${lon.toFixed(6)}</div>

<br>

<div class="coord">${toDMS(lat,1)}<br>${toDMS(lon,0)}</div>

<br>

<button onclick="openMaps(${lat},${lon})">đź“Ť Maps</button>
<button onclick="shareWhatsApp(${lat},${lon})">đź“¤ WhatsApp</button>
<button onclick="saveScreenshot()">đź“¸ Screenshot</button>

</div>
`;

 map.setView([lat,lon],13);
 if(marker) marker.setLatLng([lat,lon]);
 else marker=L.marker([lat,lon]).addTo(map);
}

// ---------------- MAIN ----------------

async function convert(){

 let res=parse(input.value);

 if(!res){
  result.innerHTML="âťŚ Invalid input";
  return;
 }

 // âś… EIRCODE VIA GOOGLE
 if(res.type==="EIRCODE"){

  try{

   let r=await fetch(
   `https://maps.googleapis.com/maps/api/geocode/json?address=${res.value},Ireland&key=AIzaSyBA7CuGaDt3OZPiUvPOYHXLvcfvOZA9vLk`);

   let d=await r.json();

   if(!d.results.length){
    result.innerHTML="âťŚ Eircode not found";
    return;
   }

   let loc=d.results[0].geometry.location;

   display(loc.lat,loc.lng,"Eircode");

  }catch{
    result.innerHTML="âťŚ Lookup failed";
  }

  return;
 }

 display(res.lat,res.lon,res.type);
}

// ---------------- ACTIONS ----------------

function openMaps(lat,lon){
 window.open(`https://maps.google.com/?q=${lat},${lon}`);
}

function shareWhatsApp(lat,lon){
 window.open("https://wa.me/?text="+encodeURIComponent(`${lat},${lon}`));
}

function saveScreenshot(){

 html2canvas(document.getElementById("captureArea"))
 .then(canvas=>{
  let img=canvas.toDataURL();
  let w=window.open();
  w.document.write(`<img src="${img}" style="width:100--- RESET ----------------

function resetTool(){
 input.value="";
 result.innerHTML="";
 if(marker){map.removeLayer(marker);marker=null;}
 map.setView([53.5,-8],7);
}

</script>
</body>
</html>
