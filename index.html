<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin">
<title>SEMRA S.C.O.U.T</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

<style>
body { font-family: Arial; background:#eef2f6; margin:0; }

.header {
  background:#1f2f3a;
  color:white;
  padding:12px;
  text-align:center;
}

.title { font-size:22px; font-weight:bold; }
.subtitle { font-size:13px; opacity:0.85; }

.container { max-width:650px; margin:auto; padding:15px; }

.panel {
  background:white;
  padding:18px;
  border-radius:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
  position:relative;
}

.signature {
  position:absolute;
  bottom:6px;
  right:10px;
  font-size:11px;
  color:#777;
}

textarea {
  width:100%;
  height:90px;
  padding:10px;
  font-size:16px;
  border-radius:6px;
  box-sizing:border-box;
}

button {
  width:100%;
  padding:14px;
  margin-top:8px;
  border:none;
  border-radius:6px;
  font-size:16px;
}

.reset { background:#777; color:white; }

.result {
  margin-top:15px;
  padding:15px;
  background:#f9f9f9;
  border-left:5px solid #0078d4;
}

.section-title { margin-top:10px; font-weight:bold; }
.grid { font-size:20px; font-weight:bold; color:#0078d4; }
.coord { font-family:monospace; }

.actions button { background:#2c3e50; color:white; }

#map { height:300px; margin-top:10px; border-radius:8px; }
</style>

</head>

<body>

<div class="header">
  <img src="icon.png" style="height:40px;">
  <div class="title">S.C.O.U.T</div>
  <div class="subtitle">SEMRA Coordinate & Orientation Utility Tool</div>
</div>

<div class="container">
<div class="panel" id="captureArea">

<textarea id="input" placeholder="Enter coordinates"></textarea>

<button onclick="convert()">Convert & Locate</button>
<button class="reset" onclick="resetTool()">Reset</button>

<div id="result"></div>
<div id="map"></div>

<div class="signature">S74</div>

</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script>

// projections
proj4.defs("EPSG:4326","+proj=longlat +datum=WGS84");
proj4.defs("EPSG:29903","+proj=tmerc +lat_0=53.5 +lon_0=-8 +x_0=200000 +y_0=250000");

// map
let map = L.map('map').setView([53.5,-8],7);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
let marker;

// formatters
function toDMS(d,lat){
 let deg=Math.floor(Math.abs(d));
 let min=Math.floor((Math.abs(d)-deg)*60);
 let sec=((Math.abs(d)-deg)*3600 - min*60).toFixed(2);
 let dir=lat?(d>=0?"N":"S"):(d>=0?"E":"W");
 return `${deg}° ${min}' ${sec}" ${dir}`;
}

function toDMM(d,lat){
 let deg=Math.floor(Math.abs(d));
 let min=((Math.abs(d)-deg)*60).toFixed(4);
 let dir=lat?(d>=0?"N":"S"):(d>=0?"E":"W");
 return `${deg}° ${min}' ${dir}`;
}

function getGridLetter(E,N){
 const grid=[['V','W','X','Y','Z'],['Q','R','S','T','U'],
 ['L','M','N','O','P'],['F','G','H','J','K'],['A','B','C','D','E']];
 return grid[Math.floor(N/100000)][Math.floor(E/100000)];
}

// parser
function parse(input){

 input=input.toUpperCase().replace(/,/g," ").trim();

 // ✅ EIRCODE
 let eircode=input.match(/^[A-Z0-9]{3}\s?[A-Z0-9]{4}$/);
if(eircode) return {type:"EIRCODE",value:input.replace(" ", "")};

 let p=input.split(" ");

 if(p.length==2 && p[0].includes("."))
  return {lat:+p[0],lon:+p[1],type:"DD"};

 return null;
}

// ✅ DISPLAY (used by EIRCODE + normal)
function display(lat,lon,type){

 let g=proj4("EPSG:4326","EPSG:29903",[lon,lat]);
 let E=g[0]+50,N=g[1]-19;

 let e=Math.round(E%100000).toString().padStart(5,'0');
 let n=Math.round(N%100000).toString().padStart(5,'0');

 let grid=`${getGridLetter(E,N)} ${e} ${n}`;

 result.innerHTML=`
<div class="result">
<b>Detected:</b> ${type}

<div class="section-title">Irish Grid</div>
<div class="grid">${grid}</div>

<div class="section-title">Decimal</div>
<div class="coord">${lat.toFixed(6)}, ${lon.toFixed(6)}</div>

<div class="section-title">DMS</div>
<div class="coord">${toDMS(lat,1)}<br>${toDMS(lon,0)}</div>

<div class="actions">
<button onclick="openMaps(${lat},${lon})">📍 Google Maps</button>
<button onclick="shareWhatsApp(${lat},${lon})">📤 WhatsApp</button>
</div>
</div>
`;

 map.setView([lat,lon],13);
 if(marker) marker.setLatLng([lat,lon]);
 else marker=L.marker([lat,lon]).addTo(map);
}

// main
function convert(){

 let res=parse(input.value);

 if(res && res.type==="EIRCODE"){

  fetch(`https://maps.googleapis.com/maps/api/geocode/json?address=${res.value}&key=AIzaSyBA7CuGaDt3OZPiUvPOYHXLvcfvOZA9vLk`)
  .then(r=>r.json())
  .then(d=>{
   if(d.results.length){
    let loc=d.results[0].geometry.location;
    display(loc.lat,loc.lng,"Eircode");
   } else result.innerHTML="❌ Eircode not found";
  });

  return;
 }

 if(!res){
  result.innerHTML="❌ Invalid input";
  return;
 }

 display(res.lat,res.lon,res.type);
}

function openMaps(lat,lon){
 window.open(`https://maps.google.com/?q=${lat},${lon}`);
}

function shareWhatsApp(lat,lon){
 window.open("https://wa.me/?text="+encodeURIComponent(`${lat},${lon}`));
}

function resetTool(){
 input.value="";
 result.innerHTML="";
 if(marker){map.removeLayer(marker);marker=null;}
 map.setView([53.5,-8],7);
}

</script>
</body>
</html>
