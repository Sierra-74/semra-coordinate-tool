<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SEMRA C.C.</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
body { margin:0; font-family:Arial; background:#eef2f6; }

.header {
 background:#2c3e50;
 color:white;
 padding:10px;
 text-align:center;
 font-size:18px;
}

.container { max-width:650px; margin:auto; padding:15px; }

.panel {
 background:white;
 padding:20px;
 border-radius:10px;
}

textarea {
 width:100%;
 height:80px;
 padding:10px;
 font-size:16px;
}

button {
 width:100%;
 padding:14px;
 margin-top:8px;
 background:#0078d4;
 color:white;
 border:none;
 border-radius:6px;
}

.reset { background:#666; }

.result {
 margin-top:15px;
 padding:15px;
 background:#f9f9f9;
}

.warning { color:#b30000; font-weight:bold; }

#map { height:300px; margin-top:10px; }
</style>
</head>

<body>

<div class="header">SEMRA C.C.</div>

<div class="container">
<div class="panel" id="captureArea">

<textarea id="input"></textarea>

<button onclick="convert()">Convert & Locate</button>
<button class="reset" onclick="resetTool()">Reset</button>

<div id="result"></div>
<div id="map"></div>

</div>
</div>

<script>

// projections
proj4.defs("EPSG:4326","+proj=longlat +datum=WGS84 +no_defs");
proj4.defs("EPSG:29903","+proj=tmerc +lat_0=53.5 +lon_0=-8 +x_0=200000 +y_0=250000");

// map
let map=L.map('map').setView([53.5,-8],7);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
let marker;

// helper
function toDMS(d,lat){
 let deg=Math.floor(Math.abs(d));
 let min=Math.floor((Math.abs(d)-deg)*60);
 let sec=((Math.abs(d)-deg)*3600 - min*60).toFixed(2);
 let dir=lat?(d>=0?"N":"S"):(d>=0?"E":"W");
 return `${deg}° ${min}' ${sec}" ${dir}`;
}

// grid
function gridLetter(E,N){
 const g=[['V','W','X','Y','Z'],['Q','R','S','T','U'],
 ['L','M','N','O','P'],['F','G','H','J','K'],['A','B','C','D','E']];
 return g[Math.floor(N/100000)][Math.floor(E/100000)];
}

// parser (stable)
function parse(input){

 input=input.toUpperCase()
 .replace(/_/g," ")
 .replace(/,/g," ")
 .replace(/[°'"]/g," ")
 .replace(/\s+/g," ")
 .trim();

 let t=input.split(" ");

 // DMS
 if(t.length>=7){
  let lat=+t[0]+t[1]/60+t[2]/3600;
  let lon=+t[4]+t[5]/60+t[6]/3600;
  if(t[3]=="S") lat*=-1;
  if(t[7]=="W") lon*=-1;
  return {lat,lon,type:"DMS"};
 }

 // decimal
 let d=input.match(/(-?\d+\.\d+)\s+(-?\d+\.\d+)/);
 if(d) return {lat:+d[1],lon:+d[2],type:"Decimal"};

 // grid
 let g=input.match(/^([A-Z])\s*(\d+)\s*(\d+)/);
 if(g){
  const letters="VWXYZQRSTULMNOPFGHJKABCDE";
  let idx=letters.indexOf(g[1]);
  let E=(idx%5)*100000+Number(g[2])*100;
  let N=Math.floor(idx/5)*100000+Number(g[3])*100;
  let c=proj4("EPSG:29903","EPSG:4326",[E,N]);
  return {lat:c[1],lon:c[0],type:"Irish Grid"};
 }

 return null;
}

// main
function convert(){

 let r=parse(input.value);

 if(!r){
  result.innerHTML="❌ Invalid input";
  return;
 }

 let lat=r.lat, lon=r.lon;

 let g=proj4("EPSG:4326","EPSG:29903",[lon,lat]);

 let grid=`${gridLetter(g[0],g[1])} ${Math.round(g[0]%100000)} ${Math.round(g[1]%100000)}`;

 result.innerHTML=`
 <div class="result">
 <b>${r.type}</b><br>
 ${lat.toFixed(6)}, ${lon.toFixed(6)}<br><br>
 ${toDMS(lat,true)}<br>${toDMS(lon,false)}<br><br>
 <b>${grid}</b>
 </div>`;

 map.setView([lat,lon],13);
 if(marker) marker.setLatLng([lat,lon]);
 else marker=L.marker([lat,lon]).addTo(map);
}

function resetTool(){
 input.value="";
 result.innerHTML="";
 if(marker) map.removeLayer(marker);
 map.setView([53.5,-8],7);
}

</script>

</body>
</html>
``
