<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />

<title>SEMRA S.C.O.U.T</title>

<link rel="manifest" href="manifest.json" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#eef2f6;
}

.header{
  background:#1f2f3a;
  color:#fff;
  text-align:center;
  padding:12px;
}

.title{font-size:22px;font-weight:700;letter-spacing:2px;}
.subtitle{font-size:13px;opacity:.85;}

.container{max-width:650px;margin:auto;padding:15px;}

.panel{
  background:#fff;
  padding:18px;
  border-radius:10px;
  box-shadow:0 2px 5px rgba(0,0,0,.1);
}

textarea{
  width:100%;
  height:90px;
  padding:10px;
  font-size:16px;
  border:1px solid #aaa;
  border-radius:6px;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:14px;
  margin-top:8px;
  border:none;
  border-radius:6px;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
}

.convert{background:#0078d4;color:#fff;}
.reset{background:#777;color:#fff;}

.result{
  margin-top:15px;
  padding:15px;
  background:#f9f9f9;
  border-left:5px solid #0078d4;
}

.section-title{margin-top:10px;font-weight:700;}
.coord{font-family:monospace;}
.grid{font-size:18px;font-weight:700;color:#0078d4;}

#map{height:300px;margin-top:10px;border-radius:8px;}
</style>
</head>
<body>

<div class="header">
  <div class="title">S.C.O.U.T</div>
  <div class="subtitle">SEMRA Coordinate & Orientation Utility Tool</div>
</div>

<div class="container">
  <div class="panel">

    <textarea id="input" placeholder="Enter coordinates or Eircode..."></textarea>

    <button class="convert" onclick="convert()">Convert & Locate</button>
    <button class="reset" onclick="resetTool()">Reset</button>

    <div id="result"></div>
    <div id="map"></div>

  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.js"></script>

<script>
// ======================
// INIT
// ======================
const input = document.getElementById("input");
const result = document.getElementById("result");

proj4.defs("EPSG:4326","+proj=longlat +datum=WGS84 +no_defs");
proj4.defs("EPSG:29903","+proj=tmerc +lat_0=53.5 +lon_0=-8 +x_0=200000 +y_0=250000");

let map, marker;

window.addEventListener("load", () => {
  map = L.map('map').setView([53.5, -8], 7);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
  }).addTo(map);
});

// ======================
// FORMATTERS
// ======================
function toDMS(d, isLat){
  const deg = Math.floor(Math.abs(d));
  const min = Math.floor((Math.abs(d)-deg)*60);
  const sec = ((Math.abs(d)-deg)*3600 - min*60).toFixed(2);
  const dir = isLat ? (d>=0?"N":"S") : (d>=0?"E":"W");
  return `${deg}° ${min}' ${sec}\" ${dir}`;
}

function toDMM(d, isLat){
  const deg = Math.floor(Math.abs(d));
  const min = ((Math.abs(d)-deg)*60).toFixed(4);
  const dir = isLat ? (d>=0?"N":"S") : (d>=0?"E":"W");
  return `${deg}° ${min}' ${dir}`;
}

function getGridLetter(E,N){
  const grid = [
    ['V','W','X','Y','Z'],
    ['Q','R','S','T','U'],
    ['L','M','N','O','P'],
    ['F','G','H','J','K'],
    ['A','B','C','D','E']
  ];

  const row = Math.floor(N/100000);
  const col = Math.floor(E/100000);

  return (grid[row] && grid[row][col]) ? grid[row][col] : '?';
}

// ======================
// PARSER
// ======================
function parse(raw){
  const input = raw.toUpperCase()
    .replace(/[_°,']/g," ")
    .replace(/\s+/g," ")
    .trim();

  // EIRCODE
  if(/^[A-Z0-9]{3}\s?[A-Z0-9]{4}$/.test(input.replace(/\s/g,""))){
    return { type:"EIRCODE", value: input.replace(/\s/g,"") };
  }

  const parts = input.split(" ");

  // Decimal
  if(parts.length === 2 && parts.every(x => /^-?\d+(\.\d+)?$/.test(x))){
    return { type:"DD", lat:+parts[0], lon:+parts[1] };
  }

  // DMM
  const dmm = input.match(/([NS])\s*(\d+)\s+(\d+(?:\.\d+)?)\s+([EW])\s*(\d+)\s+(\d+(?:\.\d+)?)/);
  if(dmm){
    let lat = +dmm[2] + (+dmm[3]/60);
    let lon = +dmm[5] + (+dmm[6]/60);
    if(dmm[1]==='S') lat*=-1;
    if(dmm[4]==='W') lon*=-1;
    return { type:"DMM", lat, lon };
  }

  // DMS
  if(parts.length >= 8 && /[NS]/.test(parts.join(" "))){
    let lat = +parts[0] + (+parts[1]/60) + (+parts[2]/3600);
    let lon = +parts[4] + (+parts[5]/60) + (+parts[6]/3600);

    if(parts[3]==='S') lat*=-1;
    if(parts[7]==='W') lon*=-1;

    return { type:"DMS", lat, lon };
  }

  // Irish Grid
  const g = input.match(/^([A-Z])\s*(\d{2,5})\s*(\d{2,5})$/);
  if(g){
    const letters="VWXYZQRSTULMNOPFGHJKABCDE";
    const idx = letters.indexOf(g[1]);
    if(idx===-1) return null;

    const scale = Math.pow(10,5-g[2].length);
    const E = (idx%5)*100000 + Number(g[2])*scale;
    const N = Math.floor(idx/5)*100000 + Number(g[3])*scale;

    const [lon, lat] = proj4("EPSG:29903","EPSG:4326",[E,N]);
    return { type:"IRISH_GRID", lat, lon };
  }

  return null;
}

// ======================
// EIRCODE LOOKUP
// ======================
async function resolveEircode(code){
  const query = encodeURIComponent(code + ", Ireland");

  try {
    const g = await fetch(`https://maps.googleapis.com/maps/api/geocode/json?address=${query}&key=YOUR_API_KEY`);
    const gd = await g.json();

    if(gd.status === "OK" && gd.results?.length){
      const loc = gd.results[0].geometry.location;
      return { lat:loc.lat, lon:loc.lng, source:"Google" };
    }
  } catch(e){}

  const o = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${query}`);
  const od = await o.json();

  if(od?.length){
    return { lat:+od[0].lat, lon:+od[0].lon, source:"OSM" };
  }

  return null;
}

// ======================
// MAIN
// ======================
async function convert(){
  const res = parse(input.value);

  if(!res){
    result.innerHTML = "❌ Invalid input";
    return;
  }

  if(res.type === "EIRCODE"){
    const loc = await resolveEircode(res.value);
    if(!loc){
      result.innerHTML = "❌ Eircode not found";
      return;
    }
    updateMap(loc.lat, loc.lon, `Eircode (${loc.source})`);
    return;
  }

  updateMap(res.lat, res.lon, res.type);
}

// ======================
// MAP
// ======================
function updateMap(lat,lon,type){

  const g = proj4("EPSG:4326","EPSG:29903",[lon,lat]);
  const E = g[0], N = g[1];

  const grid = `${getGridLetter(E,N)} ${Math.round(E%100000).toString().padStart(5,'0')} ${Math.round(N%100000).toString().padStart(5,'0')}`;

  result.innerHTML = `
    <div class="result">
      <b>Detected:</b> ${type}

      <div class="section-title">Irish Grid</div>
      <div class="grid">${grid}</div>

      <div class="section-title">Decimal</div>
      <div class="coord">${lat.toFixed(6)}, ${lon.toFixed(6)}</div>

      <div class="section-title">DMS</div>
      <div class="coord">${toDMS(lat,true)}<br>${toDMS(lon,false)}</div>

      <div class="section-title">DDM</div>
      <div class="coord">${toDMM(lat,true)}<br>${toDMM(lon,false)}</div>
    </div>
  `;

  map.setView([lat,lon],13);

  if(marker) marker.setLatLng([lat,lon]);
  else marker = L.marker([lat,lon]).addTo(map);
}

// ======================
// RESET
// ======================
function resetTool(){
  input.value="";
  result.innerHTML="";
  if(marker){ map.removeLayer(marker); marker=null; }
  map.setView([53.5,-8],7);
}
</script>

</body>
</html>
