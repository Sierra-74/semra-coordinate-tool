<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SEMRA Coordinate Converter</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2c3e50">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
body { margin:0; font-family:Arial; background:#eef2f6; }

.header {
    background:#2c3e50;
    color:white;
    padding:10px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
}

.logo { height:40px; }

.container { max-width:650px; margin:auto; padding:15px; }

.panel {
    background:white;
    padding:20px;
    border-radius:10px;
    position:relative;
}

textarea {
    width:100%;
    height:70px;
    padding:10px;
    font-size:16px;
}

button {
    width:100%;
    padding:14px;
    margin-top:8px;
    background:#0078d4;
    color:white;
    border:none;
    border-radius:6px;
}

.reset { background:#666; }

.result {
    margin-top:15px;
    padding:15px;
    background:#f9f9f9;
}

#map { height:300px; margin-top:15px; }

.signature {
    position:absolute;
    bottom:6px;
    right:10px;
    font-size:11px;
    color:#888;
}
</style>
</head>

<body>

<div class="header">
<img src="https://www.semra.ie/wp-content/uploads/2021/10/semra_logo_196x221_transparent.png" class="logo">
<div>SEMRA Coordinate Converter</div>
</div>

<div class="container">
<div class="panel" id="captureArea">

<textarea id="input" placeholder="Enter or paste coordinates"></textarea>

<button onclick="convert()">Convert & Locate</button>
<button class="reset" onclick="resetTool()">Reset</button>

<div id="result"></div>
<div id="map"></div>

<div class="signature">S74</div>

</div>
</div>

<script>

// projections
proj4.defs("EPSG:4326","+proj=longlat +datum=WGS84 +no_defs");
proj4.defs("EPSG:29903","+proj=tmerc +lat_0=53.5 +lon_0=-8 +k=1.000035 +x_0=200000 +y_0=250000 +ellps=airy");

// map
let map = L.map('map').setView([53.4,-8],7);
L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',{maxZoom:17}).addTo(map);
let marker;

// formatters
function toDMS(deg,lat){
    let d=Math.floor(Math.abs(deg));
    let m=Math.floor((Math.abs(deg)-d)*60);
    let s=(((Math.abs(deg)-d)*60-m)*60).toFixed(2);
    let dir=lat?(deg>=0?"N":"S"):(deg>=0?"E":"W");
    return `${d}° ${m}' ${s}" ${dir}`;
}

function toDMM(deg,lat){
    let d=Math.floor(Math.abs(deg));
    let m=((Math.abs(deg)-d)*60).toFixed(4);
    let dir=lat?(deg>=0?"N":"S"):(deg>=0?"E":"W");
    return `${d}° ${m}' ${dir}`;
}

// grid letter
function getGridLetter(E,N){
    const grid=[
        ['V','W','X','Y','Z'],
        ['Q','R','S','T','U'],
        ['L','M','N','O','P'],
        ['F','G','H','J','K'],
        ['A','B','C','D','E']
    ];
    return grid[Math.floor(N/100000)][Math.floor(E/100000)];
}

// ✅ PARSER WITH TYPE + ACCURACY
function parse(input){

    input=input.toUpperCase()
    .replace(/_/g," ")
    .replace(/[°'"]/g," ")
    .replace(/\s+/g," ")
    .trim();

    // DMS
    let comp=input.match(/(\d{3,4})\s+([\d.]+)\s*([NS]).+?(\d{3,4})\s+([\d.]+)\s*([EW])/);
    if(comp){
        let lat=Math.floor(comp[1]/100)+(comp[1]%100)/60+comp[2]/3600;
        let lon=Math.floor(comp[4]/100)+(comp[4]%100)/60+comp[5]/3600;
        if(comp[3]=="S") lat*=-1;
        if(comp[6]=="W") lon*=-1;
        return {lat,lon,type:"DMS",acc:"±5m"};
    }

    // DMM
    let dmm=input.match(/([NS])\s*(\d+)\s+([\d.]+).+?([EW])\s*(\d+)\s+([\d.]+)/);
    if(dmm){
        let lat=(+dmm[2])+(+dmm[3]/60);
        let lon=(+dmm[5])+(+dmm[6]/60);
        if(dmm[1]=="S") lat*=-1;
        if(dmm[4]=="W") lon*=-1;
        return {lat,lon,type:"DMM",acc:"±30m"};
    }

    // Decimal
    let dec=input.match(/(-?\d+\.\d+)[,\s]+(-?\d+\.\d+)/);
    if(dec){
        let precision = dec[1].split(".")[1].length;
        let acc = precision>=6 ? "±1m" : "±10m";
        return {lat:+dec[1],lon:+dec[2],type:"Decimal",acc};
    }

    // Irish Grid
    let grid=input.match(/^([A-Z])\s*(\d+)\s*(\d+)/);
    if(grid){
        const letters="VWXYZQRSTULMNOPFGHJKABCDE";
        let idx=letters.indexOf(grid[1]);

        let e100=idx%5;
        let n100=Math.floor(idx/5);

        let scale=Math.pow(10,5-grid[2].length);

        let E=e100*100000+Number(grid[2])*scale;
        let N=n100*100000+Number(grid[3])*scale;

        let coords=proj4("EPSG:29903","EPSG:4326",[E-50,N+19]);

        let acc = ["±1000m","±100m","±10m","±1m"][grid[2].length-2];

        return {lat:coords[1],lon:coords[0],type:"Irish Grid",acc};
    }

    return null;
}

// main
function convert(){

    let res=parse(input.value);

    if(!res){
        result.innerHTML="❌ Invalid input";
        return;
    }

    let lat=res.lat, lon=res.lon;

    let g=proj4("EPSG:4326","EPSG:29903",[lon,lat]);
    let E=g[0]+50, N=g[1]-19;

    let grid=`${getGridLetter(E,N)} ${Math.round(E%100000)} ${Math.round(N%100000)}`;

    result.innerHTML=`
    <div class="result">

    <b>Detected:</b> ${res.type} | <b>Accuracy:</b> ${res.acc}

    <br><br><b>Irish Grid</b><br>${grid}

    <br><b>Decimal</b><br>${lat.toFixed(6)}, ${lon.toFixed(6)}

    <br><b>DMS</b><br>${toDMS(lat,true)}<br>${toDMS(lon,false)}

    <br><b>DMM</b><br>${toDMM(lat,true)}<br>${toDMM(lon,false)}

    </div>
    `;

    map.setView([lat,lon],13);
    if(marker) marker.setLatLng([lat,lon]);
    else marker=L.marker([lat,lon]).addTo(map);
}

// reset
function resetTool(){
    input.value="";
    result.innerHTML="";
    if(marker) map.removeLayer(marker);
    map.setView([53.4,-8],7);
}

</script>

</body>
</html>
