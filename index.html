<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SEMRA C.C.</title>

<!-- ✅ Correct libraries -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.csscom/leaflet@1.9.4/dist/leaflet.jsript src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
body { margin:0; font-family:Arial; background:#eef2f6; }

.header {
 background:#2c3e50;
 color:white;
 padding:10px;
 text-align:center;
 font-size:18px;
}

.container { max-width:650px; margin:auto; padding:15px; }

.panel {
 background:white;
 padding:20px;
 border-radius:10px;
}

textarea {
 width:100%;
 height:80px;
 padding:10px;
 font-size:16px;
}

button {
 width:100%;
 padding:14px;
 margin-top:8px;
 background:#0078d4;
 color:white;
 border:none;
 border-radius:6px;
 font-size:16px;
}

.reset { background:#666; }

.result {
 margin-top:15px;
 padding:15px;
 background:#f9f9f9;
 line-height:1.6;
}

.warning { color:#b30000; font-weight:bold; }

#map { height:300px; margin-top:10px; }
</style>
</head>

<body>

<div class="header">SEMRA C.C.</div>

<div class="container">
<div class="panel" id="captureArea">

<textarea id="input" placeholder="Enter coordinates"></textarea>

<button onclick="convert()">Convert & Locate</button>
<button class="reset" onclick="resetTool()">Reset</button>

<div id="result"></div>
<div id="map"></div>

</div>
</div>

<script>

// projections
proj4.defs("EPSG:4326","+proj=longlat +datum=WGS84 +no_defs");
proj4.defs("EPSG:29903","+proj=tmerc +lat_0=53.5 +lon_0=-8 +x_0=200000 +y_0=250000 +ellps=airy");

// map
let map = L.map('map').setView([53.5,-8],7);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
let marker;

// helpers
function toDMS(d,lat){
 let deg=Math.floor(Math.abs(d));
 let min=Math.floor((Math.abs(d)-deg)*60);
 let sec=((Math.abs(d)-deg)*3600 - min*60).toFixed(2);
 let dir=lat?(d>=0?"N":"S"):(d>=0?"E":"W");
 return `${deg}° ${min}' ${sec}" ${dir}`;
}

function toDMM(d,lat){
 let deg=Math.floor(Math.abs(d));
 let min=((Math.abs(d)-deg)*60).toFixed(4);
 let dir=lat?(d>=0?"N":"S"):(d>=0?"E":"W");
 return `${deg}° ${min}' ${dir}`;
}

function getGridLetter(E,N){
 const grid=[['V','W','X','Y','Z'],['Q','R','S','T','U'],
 ['L','M','N','O','P'],['F','G','H','J','K'],['A','B','C','D','E']];
 return grid[Math.floor(N/100000)][Math.floor(E/100000)];
}

// ✅ PARSER (stable + complete)
function parse(input){

 input=input.toUpperCase()
 .replace(/_/g," ")
 .replace(/,/g," ")
 .replace(/[°'"]/g," ")
 .replace(/\s+/g," ")
 .trim();

 let t=input.split(" ");

 // ✅ DMS full
 if(t.length>=7){
  let lat=+t[0]+t[1]/60+t[2]/3600;
  let lon=+t[4]+t[5]/60+t[6]/3600;
  if(t[3]=="S") lat*=-1;
  if(t[7]=="W") lon*=-1;
  return {lat,lon,type:"DMS"};
 }

 // ✅ compressed DMS
 if(t.length>=6 && t[0].length>=3){
  function dm(v){
   let d=parseInt(v.slice(0,2));
   let m=parseInt(v.slice(2)||0);
   return [d,m];
  }

  let [d1,m1]=dm(t[0]);
  let [d2,m2]=dm(t[3]);

  let lat=d1+(m1/60)+(t[1]/3600);
  let lon=d2+(m2/60)+(t[4]/3600);

  if(t[2]=="S") lat*=-1;
  if(t[5]=="W") lon*=-1;

  return {lat,lon,type:"DMS"};
 }

 // ✅ DMM
 let dmm=input.match(/([NS])\s*(\d+)\s+([\d.]+).*?([EW])\s*(\d+)\s+([\d.]+)/);
 if(dmm){
  let lat=(+dmm[2])+(+dmm[3]/60);
  let lon=(+dmm[5])+(+dmm[6]/60);
  if(dmm[1]=="S") lat*=-1;
  if(dmm[4]=="W") lon*=-1;
  return {lat,lon,type:"DMM"};
 }

 // ✅ Decimal
 let dec=input.match(/(-?\d+\.\d+)\s+(-?\d+\.\d+)/);
 if(dec){
  return {lat:+dec[1],lon:+dec[2],type:"Decimal"};
 }

 // ✅ Irish Grid
 let g=input.match(/^([A-Z])\s*(\d+)\s*(\d+)/);
 if(g){
  const letters="VWXYZQRSTULMNOPFGHJKABCDE";
  let idx=letters.indexOf(g[1]);

  let scale=Math.pow(10,5-g[2].length);

  let E=(idx%5)*100000 + Number(g[2])*scale;
  let N=Math.floor(idx/5)*100000 + Number(g[3])*scale;

  let c=proj4("EPSG:29903","EPSG:4326",[E-50,N+19]);

  return {lat:c[1],lon:c[0],type:"Irish Grid"};
 }

 return null;
}

// warning
function warning(lat,lon){
 if(lat<51||lat>56||lon>-5||lon<-11){
  return "⚠️ Location outside Ireland";
 }
 return "";
}

// ✅ MAIN
function convert(){

 let res=parse(input.value);

 if(!res){
  result.innerHTML="❌ Invalid input";
  return;
 }

 let lat=res.lat, lon=res.lon;

 let g=proj4("EPSG:4326","EPSG:29903",[lon,lat]);
 let E=g[0]+50, N=g[1]-19;

 let grid=`${getGridLetter(E,N)} ${Math.round((E%100000)/100)} ${Math.round((N%100000)/100)}`;

 let warn=warning(lat,lon);

 result.innerHTML=`
 <div class="result">

 <b>Detected:</b> ${res.type}

 <br><br><b>Irish Grid</b><br>${grid}

 <br><b>Decimal (DD)</b><br>${lat.toFixed(6)}, ${lon.toFixed(6)}

 <br><b>DMS</b><br>${toDMS(lat,true)}<br>${toDMS(lon,false)}

 <br><b>DMM</b><br>${toDMM(lat,true)}<br>${toDMM(lon,false)}

 ${warn?`<div class="warning">${warn}</div>`:""}

 <br><br>
 <button onclick="shareWhatsApp(${lat},${lon})">Share via WhatsApp</button>
 <button onclick="saveScreenshot()">Share Screenshot</button>

 </div>
 `;

 map.setView([lat,lon],13);
 if(marker) marker.setLatLng([lat,lon]);
 else marker=L.marker([lat,lon]).addTo(map);
}

// WhatsApp
function shareWhatsApp(lat,lon){
 let msg=`${lat.toFixed(6)}, ${lon.toFixed(6)}\nhttps://maps.google.com/?q=${lat},${lon}`;
 window.open("https://wa.me/?text="+encodeURIComponent(msg));
}

// screenshot
function saveScreenshot(){
 html2canvas(document.querySelector("#captureArea")).then(canvas=>{
   let img=canvas.toDataURL("image/png");
   let w=window.open();
   w.document.write(`<img src="${img}" style="width:100nnerHTML="";
 if(marker){ map.removeLayer(marker); marker=null; }
 map.setView([53.5,-8],7);
}

</script>

</body>
</html>
