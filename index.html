<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta charset="utf-8">

<title>SEMRA S.C.O.U.T</title>

<!-- Manifest (FIXED) -->
<link rel="manifest" href="manifest.json">

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#eef2f6;
}

.header {
  background:#1f2f3a;
  color:white;
  padding:12px;
  text-align:center;
}

.title { font-size:22px; font-weight:bold; letter-spacing:2px; }
.subtitle { font-size:13px; opacity:0.85; }

.container {
  max-width:650px;
  margin:auto;
  padding:15px;
}

.panel {
  background:white;
  padding:18px;
  border-radius:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
  position:relative;
}

textarea {
  width:100%;
  height:90px;
  padding:10px;
  font-size:16px;
  border:1px solid #aaa;
  border-radius:6px;
  box-sizing:border-box;
}

button {
  width:100%;
  padding:14px;
  margin-top:8px;
  border:none;
  border-radius:6px;
  font-size:16px;
  font-weight:bold;
}

.reset { background:#777; color:white; }
.convert { background:#0078d4; color:white; }

.result {
  margin-top:15px;
  padding:15px;
  background:#f9f9f9;
  border-left:5px solid #0078d4;
}

.section-title { margin-top:10px; font-weight:bold; }
.grid { font-size:20px; font-weight:bold; color:#0078d4; }
.coord { font-family: monospace; font-size:15px; }

#map {
  height:300px;
  margin-top:10px;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="header">
  <div class="title">S.C.O.U.T</div>
  <div class="subtitle">SEMRA Coordinate & Orientation Utility Tool</div>
</div>

<div class="container">
  <div class="panel" id="captureArea">

    <textarea id="input" placeholder="Enter coordinates"></textarea>

    <button class="convert" onclick="convert()">Convert & Locate</button>
    <button class="reset" onclick="resetTool()">Reset</button>

    <div id="result"></div>
    <div id="map"></div>

  </div>
</div>

<!-- Scripts (CLEAN ORDER) -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script>
// FIXED ELEMENT REFERENCES
const input = document.getElementById("input");
const result = document.getElementById("result");

// PROJECTIONS
proj4.defs("EPSG:4326","+proj=longlat +datum=WGS84 +no_defs");
proj4.defs("EPSG:29903","+proj=tmerc +lat_0=53.5 +lon_0=-8 +x_0=200000 +y_0=250000");

// MAP INIT (FIXED SAFE LOAD)
let map = L.map('map').setView([53.5,-8],7);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  crossOrigin: true
}).addTo(map);

let marker;

// FORMATTERS
function toDMS(d,lat){
 let deg=Math.floor(Math.abs(d));
 let min=Math.floor((Math.abs(d)-deg)*60);
 let sec=((Math.abs(d)-deg)*3600 - min*60).toFixed(2);
 let dir=lat?(d>=0?"N":"S"):(d>=0?"E":"W");
 return `${deg}° ${min}' ${sec}" ${dir}`;
}

function toDMM(d,lat){
 let deg=Math.floor(Math.abs(d));
 let min=((Math.abs(d)-deg)*60).toFixed(4);
 let dir=lat?(d>=0?"N":"S"):(d>=0?"E":"W");
 return `${deg}° ${min}' ${dir}`;
}

function getGridLetter(E,N){
 const grid=[
 ['V','W','X','Y','Z'],
 ['Q','R','S','T','U'],
 ['L','M','N','O','P'],
 ['F','G','H','J','K'],
 ['A','B','C','D','E']
 ];
 return grid[Math.floor(N/100000)][Math.floor(E/100000)];
}

// PARSER (FIXED)
function parse(input){

    input = input.toUpperCase()
        .replace(/_/g," ")
        .replace(/,/g," ")
        .replace(/[°'"]/g," ")
        .replace(/\s+/g," ")
        .trim();

    // ✅ EIRCODE (RESTORED)
    let eircodeMatch = input.match(/^[A-Z0-9]{3}\s?[A-Z0-9]{4}$/);
    if(eircodeMatch){
        return {
            type: "EIRCODE",
            value: input.replace(/\s+/g, "")
        };
    }

    // ✅ DECIMAL DD (RESTORED FLEXIBILITY)
    let parts = input.split(" ");

    if(parts.length === 2 &&
       /^-?\d+(\.\d+)?$/.test(parts[0]) &&
       /^-?\d+(\.\d+)?$/.test(parts[1])){

        return {
            lat: parseFloat(parts[0]),
            lon: parseFloat(parts[1]),
            type: "Decimal (DD)"
        };
    }

    // split decimal lat case (RESTORED)
    if(parts.length === 3 &&
       /^-?\d+(\.\d+)?$/.test(parts[0]) &&
       /^\d+$/.test(parts[1]) &&
       /^-?\d+(\.\d+)?$/.test(parts[2])){

        return {
            lat: parseFloat(parts[0] + parts[1]),
            lon: parseFloat(parts[2]),
            type: "Decimal (DD)"
        };
    }

    // ✅ DMM (RESTORED EXACT ORIGINAL BEHAVIOUR)
    let dmm = input.match(/([NS])\s*(\d+)\s+([\d.]+)\s+([EW])\s*(\d+)\s+([\d.]+)/);
    if(dmm){
        let lat = (+dmm[2]) + (+dmm[3]/60);
        let lon = (+dmm[5]) + (+dmm[6]/60);

        if(dmm[1]==="S") lat *= -1;
        if(dmm[4]==="W") lon *= -1;

        return { lat, lon, type:"DDM" };
    }

    // ✅ FULL DMS (RESTORED SAFETY CHECK)
    let t = input.split(" ");

    if(t.length >= 8 && (t.includes("N") || t.includes("S"))){
        let lat = (+t[0]) + (t[1]/60) + (t[2]/3600);
        let lon = (+t[4]) + (t[5]/60) + (t[6]/3600);

        if(t[3] === "S") lat *= -1;
        if(t[7] === "W") lon *= -1;

        return { lat, lon, type:"DMS" };
    }

    // ✅ COMPRESSED DMS (RESTORED ORIGINAL LOGIC)
    if(t.length >= 6 && /^[0-9]+$/.test(t[0])){

        function parseDM(value){
            value = value.toString();

            if(value.length === 4)
                return [parseInt(value.slice(0,2)), parseInt(value.slice(2))];

            if(value.length === 3)
                return [parseInt(value.slice(0,1)), parseInt(value.slice(1))];

            if(value.length === 2)
                return [parseInt(value[0]), parseInt(value[1])];

            return [parseInt(value), 0];
        }

        let [dLat, mLat] = parseDM(t[0]);
        let [dLon, mLon] = parseDM(t[3]);

        let lat = dLat + (mLat/60) + (parseFloat(t[1]) / 3600);
        let lon = dLon + (mLon/60) + (parseFloat(t[4]) / 3600);

        if(t[2] === "S") lat *= -1;
        if(t[5] === "W") lon *= -1;

        return {
            lat,
            lon,
            type: "DMS (Compressed)"
        };
    }

    // ✅ IRISH GRID (UNCHANGED BUT SAFE)
    let grid = input.match(/^([A-Z])\s*(\d{2,5})\s*(\d{2,5})$/);

    if(grid){
        const letters="VWXYZQRSTULMNOPFGHJKABCDE";

        if(!letters.includes(grid[1])) return null;

        let idx=letters.indexOf(grid[1]);
        let scale=Math.pow(10,5-grid[2].length);

        let E=(idx%5)*100000 + Number(grid[2])*scale;
        let N=Math.floor(idx/5)*100000 + Number(grid[3])*scale;

        let c=proj4("EPSG:29903","EPSG:4326",[E-50,N+19]);

        return {
            lat:c[1],
            lon:c[0],
            type:"Irish Grid"
        };
    }

    return null;
}
// MAIN
function convert(){

let res=parse(input.value);

if(!res){
 result.innerHTML="❌ Invalid input";
 return;
}

// EIRCODE HANDLING
if(res && res.type === "EIRCODE"){

  const apiKey = "https://ws.postcoder.com/pcw/{apikey}/position/{countrycode}/{postcode}";

  fetch(`https://ws.postcoder.com/pcw/${apiKey}/position/ie/${encodeURIComponent(res.value)}`)
    .then(r => r.json())
    .then(data => {

      console.log("Postcoder response:", data);

      // ✅ VALIDATION
      if(!data || !data.latitude || !data.longitude){
        result.innerHTML = "❌ Eircode not found";
        return;
      }

      let lat = parseFloat(data.latitude);
      let lon = parseFloat(data.longitude);

      updateMap(lat, lon, "Eircode");

    })
    .catch(err => {
      console.error(err);
      result.innerHTML = "❌ Eircode lookup failed";
    });

  return;
}

let lat=data.results[0].geometry.location.lat;
let lon=data.results[0].geometry.location.lng;

updateMap(lat,lon,"Eircode");

});
return;
}

// NORMAL COORDS
updateMap(res.lat,res.lon,res.type);
}

// MAP UPDATE (CENTRALISED FIX)
function updateMap(lat,lon,type){

let g=proj4("EPSG:4326","EPSG:29903",[lon,lat]);
let E=g[0]+50, N=g[1]-19;

let grid=`${getGridLetter(E,N)} 
${String(Math.round(E%100000)).padStart(5,'0')} 
${String(Math.round(N%100000)).padStart(5,'0')}`;

result.innerHTML=`
<div class="result">

<b>Detected:</b> ${type}

<div class="section-title">Irish Grid</div>
<div class="grid">${grid}</div>

<div class="section-title">Decimal</div>
<div class="coord">${lat.toFixed(6)}, ${lon.toFixed(6)}</div>

<div class="section-title">DMS</div>
<div class="coord">${toDMS(lat,true)}<br>${toDMS(lon,false)}</div>

<div class="section-title">DDM</div>
<div class="coord">${toDMM(lat,true)}<br>${toDMM(lon,false)}</div>

</div>
`;

map.setView([lat,lon],13);

if(marker) marker.setLatLng([lat,lon]);
else marker=L.marker([lat,lon]).addTo(map);
}

// RESET
function resetTool(){
input.value="";
result.innerHTML="";
if(marker){map.removeLayer(marker);marker=null;}
map.setView([53.5,-8],7);
}
</script>

</body>
</html>
