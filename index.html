<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.jsript src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>

body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#eef2f6;
}

/* ✅ HEADER */
.header {
  background:#1f2f3a;
  color:white;
  padding:12px;
  text-align:center;
}

.title {
  font-size:22px;
  font-weight:bold;
  letter-spacing:2px;
}

.subtitle {
  font-size:13px;
  opacity:0.85;
}

/* ✅ LAYOUT */
.container {
  max-width:650px;
  margin:auto;
  padding:15px;
}

.panel {
  background:white;
  padding:18px;
  border-radius:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);

.signature {
  position:absolute;

  color:#777;
  opacity:0.7;
}

  


/* ✅ INPUT */
textarea {
  width:100%;
  height:90px;
  padding:10px;
  font-size:16px;
  border:1px solid #aaa;
  border-radius:6px;
  resize:vertical;
  box-sizing:border-box;   /* ✅ CRITICAL FIX */
}

/* ✅ BUTTONS */
button {
  width:100%;
  padding:14px;
  margin-top:8px;
  border:none;
  border-radius:6px;
  font-size:16px;

}

/* ✅ SECTION HEADERS */

  margin-top:10px;

  font-family: "Courier New", monospace;

<body>


<div class="header">
  <img src="icon.png" style="height:40px; margin-bottom:5px;">
  <div class="title">S.C.O.U.T</div>
  <div class="subtitle">SEMRA Coordinate & Orientation Utility Tool</div>
</div>


<div class="container">
<div class="panel" id="captureArea">
  <div class="signature">S74</div>
  
<textarea id="input" placeholder="Enter coordinates"></textarea>

<button onclick="convert()">Convert & Locate</button>
<button class="reset" onclick="resetTool()">Reset</button>

<div id="result"></div>
<div id="map"></div>

</div>
</div>

<script>

// projections
proj4.defs("EPSG:4326","+proj=longlat +datum=WGS84 +no_defs");
proj4.defs("EPSG:29903","+proj=tmerc +lat_0=53.5 +lon_0=-8 +x_0=200000 +y_0=250000");

// map
let map = L.map('map').setView([53.5,-8],7);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  crossOrigin: true
}).addTo(map);
let marker;

// formatters
function toDMS(d,lat){
 let deg=Math.floor(Math.abs(d));
 let min=Math.floor((Math.abs(d)-deg)*60);
 let sec=((Math.abs(d)-deg)*3600 - min*60).toFixed(2);
 let dir=lat?(d>=0?"N":"S"):(d>=0?"E":"W");
 return `${deg}° ${min}' ${sec}" ${dir}`;
}

function toDMM(d,lat){
 let deg=Math.floor(Math.abs(d));
 let min=((Math.abs(d)-deg)*60).toFixed(4);
 let dir=lat?(d>=0?"N":"S"):(d>=0?"E":"W");
 return `${deg}° ${min}' ${dir}`;
}

function getGridLetter(E,N){
 const grid=[['V','W','X','Y','Z'],['Q','R','S','T','U'],
 ['L','M','N','O','P'],['F','G','H','J','K'],['A','B','C','D','E']];
 return grid[Math.floor(N/100000)][Math.floor(E/100000)];
}

// ✅ FIXED PARSER (ORDER CRITICAL)
function parse(input){

    input = input.toUpperCase()
        .replace(/_/g," ")
        .replace(/,/g," ")
        .replace(/[°'"]/g," ")
        .replace(/\s+/g," ")
        .trim();

    // ✅ DECIMAL (robust - handles split & normal safely)
let parts = input.split(" ");

// ✅ Case 1: normal decimal
// e.g. 52.664597 -6.496500
if(parts.length === 2 &&
   /^-?\d+\.\d+$/.test(parts[0]) &&
   /^-?\d+\.\d+$/.test(parts[1]))
{
    return {
        lat: parseFloat(parts[0]),
        lon: parseFloat(parts[1]),
        type: "Decimal (DD)"
    };
}

// ✅ Case 2: split decimal latitude
// e.g. 53.002 8001 -6.3525070
if(parts.length === 3 &&
   /^-?\d+\.\d+$/.test(parts[0]) &&
   /^\d+$/.test(parts[1]) &&
   /^-?\d+\.\d+$/.test(parts[2]))
{
    let lat = parseFloat(parts[0] + parts[1]);  // join split lat
    let lon = parseFloat(parts[2]);

    return {
        lat,
        lon,
        type: "Decimal (DD)"
    };
}

    // ✅ 2. DMM (N 52 29.10 W 6 44.81)
    let dmm = input.match(/([NS])\s*(\d+)\s+([\d.]+)\s+([EW])\s*(\d+)\s+([\d.]+)/);
    if(dmm){
        let lat = (+dmm[2]) + (+dmm[3]/60);
        let lon = (+dmm[5]) + (+dmm[6]/60);

        if(dmm[1]==="S") lat *= -1;
        if(dmm[4]==="W") lon *= -1;

        return { lat, lon, type:"DDM" };
    }

    let t = input.split(" ");

    // ✅ 3. FULL DMS
    if(t.length >= 8 && (t.includes("N") || t.includes("S"))){
        let lat = (+t[0]) + (t[1]/60) + (t[2]/3600);
        let lon = (+t[4]) + (t[5]/60) + (t[6]/3600);

        if(t[3] === "S") lat *= -1;
        if(t[7] === "W") lon *= -1;

        return { lat, lon, type:"DMS" };
    }

    // ✅ 4. COMPRESSED DMS (5215 7.26 N)
// ✅ COMPRESSED DMS (ROBUST FIX)
if(t.length >= 6 && /^[0-9]+$/.test(t[0])){

    function parseDM(value){

        value = value.toString();

        // length 4 → 5215 → 52° 15'
        if(value.length === 4){
            return [parseInt(value.slice(0,2)), parseInt(value.slice(2))];
        }

        // length 3 → 833 → 8° 33'
        if(value.length === 3){
            return [parseInt(value.slice(0,1)), parseInt(value.slice(1))];
        }

        // length 2 → 83 → assume 8° 3'
        if(value.length === 2){
            return [parseInt(value[0]), parseInt(value[1])];
        }

        // fallback (safe default)
        return [parseInt(value), 0];
    }

    let [dLat, mLat] = parseDM(t[0]);
    let [dLon, mLon] = parseDM(t[3]);

    let lat = dLat + (mLat/60) + (parseFloat(t[1]) / 3600);
    let lon = dLon + (mLon/60) + (parseFloat(t[4]) / 3600);

    if(t[2] === "S") lat *= -1;
    if(t[5] === "W") lon *= -1;

    return {
        lat,
        lon,
        type: "DMS (Compressed)"
    };
}

    // ✅ 5. IRISH GRID (STRICT MATCH ONLY)
    let grid = input.match(/^([A-Z])\s*(\d{2,5})\s*(\d{2,5})$/);

    if(grid){
        const letters="VWXYZQRSTULMNOPFGHJKABCDE";

        if(!letters.includes(grid[1])) return null;  // ✅ prevents N/S confusion

        let idx=letters.indexOf(grid[1]);

        let scale=Math.pow(10,5-grid[2].length);

        let E=(idx%5)*100000 + Number(grid[2])*scale;
        let N=Math.floor(idx/5)*100000 + Number(grid[3])*scale;

        let c=proj4("EPSG:29903","EPSG:4326",[E-50,N+19]);

        return {
            lat:c[1],
            lon:c[0],
            type:"Irish Grid"
        };
    }

    return null;
}
// ✅ MAIN
function convert(){

 let res=parse(input.value);

 if(!res){
  result.innerHTML="❌ Invalid input";
  return;
 }

 let lat=res.lat, lon=res.lon;

 let g=proj4("EPSG:4326","EPSG:29903",[lon,lat]);
 let E=g[0]+50, N=g[1]-19;

 // ✅ full precision grid (5-digit)
let easting = Math.round(E % 100000);
let northing = Math.round(N % 100000);

// pad numbers to 5 digits
easting = easting.toString().padStart(5, '0');
northing = northing.toString().padStart(5, '0');

let grid = `${getGridLetter(E,N)} ${easting} ${northing}`;

result.innerHTML=`
<div class="result">

<b>Detected:</b> ${res.type}

<div class="section-title">Irish Grid</div>
<div class="grid">${grid}</div>

<div class="section-title">Decimal (DD)</div>
<div class="coord">${lat.toFixed(6)}, ${lon.toFixed(6)}</div>

<div class="section-title">DMS</div>
<div class="coord">${toDMS(lat,true)}<br>${toDMS(lon,false)}</div>

<div class="section-title">DDM</div>
<div class="coord">${toDMM(lat,true)}<br>${toDMM(lon,false)}</div>

<div class="actions">
  <button onclick="openMaps(${lat},${lon})">📍 Open in Google Maps</button>
  <button onclick="shareWhatsApp(${lat},${lon})">📤 Share via WhatsApp</button>
  <button onclick="saveScreenshot()">📸 Screenshot</button>
</div>

</div>
`;

 map.setView([lat,lon],13);
 if(marker) marker.setLatLng([lat,lon]);
 else marker=L.marker([lat,lon]).addTo(map);
}

// tools
function openMaps(lat,lon){
 window.open(`https://maps.google.com/?q=${lat},${lon}`);
}

function shareWhatsApp(lat, lon){

  // ✅ Convert to Irish Grid
  let g = proj4("EPSG:4326","EPSG:29903",[lon,lat]);
  let E = g[0] + 50;
  let N = g[1] - 19;

  let easting = Math.round(E % 100000).toString().padStart(5,'0');
  let northing = Math.round(N % 100000).toString().padStart(5,'0');

  let letter = getGridLetter(E,N);

  // ✅ full grid
  let gridFull = `${letter} ${easting} ${northing}`;

  // ✅ Build message
  let message =
`📍 SCOUT Location

Irish Grid (Full):
${gridFull}

Decimal:
${lat.toFixed(6)}, ${lon.toFixed(6)}

Google Maps:
https://maps.google.com/?q=${lat},${lon}`;

  // ✅ Open WhatsApp
  window.open("https://wa.me/?text=" + encodeURIComponent(message));
}


function saveScreenshot(){

  html2canvas(document.getElementById("captureArea"), {
    useCORS: true,       // ✅ allow external images
    allowTaint: false,
    backgroundColor: "#ffffff"
  }).then(canvas => {

    let img = canvas.toDataURL("image/png");

    // ✅ open image (works on phone + desktop)
    let w = window.open();
    w.document.write('<img src="'+img+'" style="width:100%">');

  });
}

function resetTool(){
 input.value="";
 result.innerHTML="";
 if(marker){ map.removeLayer(marker); marker=null;}
 map.setView([53.5,-8],7);
}

</script>
</body>
</html>
